name: Update pinned repos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pinned-repos
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run update:pinned-repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated repo metadata
        run: |
          if [[ -n "$(git status --porcelain src/data/pinned-repos.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/pinned-repos.json
            git commit -m "Update pinned repo metadata"
            git push
          else
            echo "Pinned repo metadata is already up to date."
          fi
